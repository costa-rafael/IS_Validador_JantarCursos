<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bilhetes · Jantar de Cursos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #07090f;
      --s1: #0e1220;
      --s2: #141928;
      --s3: #1c2335;
      --gold: #c9a84c;
      --gold-l: #e8ce8a;
      --gold-d: rgba(201,168,76,0.13);
      --green: #34d399;
      --green-d: rgba(52,211,153,0.12);
      --amber: #fbbf24;
      --amber-d: rgba(251,191,36,0.12);
      --red: #f87171;
      --red-d: rgba(248,113,113,0.12);
      --muted: #606b85;
      --text: #dde3f0;
      --dim: #8a95ad;
      --border: rgba(255,255,255,0.07);
      --border-g: rgba(201,168,76,0.22);
      --r: 16px;
      --r-sm: 10px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── SCANNER OVERLAY ─── */
    #scanOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      flex-direction: column;
    }
    #scanOverlay.active { display: flex; }

    #scanVideo {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    .scan-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: min(80vw, 320px);
      height: min(36vw, 130px);
      position: relative;
    }

    .scan-frame::before, .scan-frame::after,
    .scan-frame > span::before, .scan-frame > span::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--gold);
      border-style: solid;
    }
    .scan-frame::before  { top:0; left:0;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .scan-frame::after   { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .scan-frame>span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .scan-frame>span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    .scan-line {
      position: absolute;
      left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%,100% { top: 10%; opacity: 1; }
      50%      { top: 84%; opacity: 0.6; }
    }

    .scan-hint {
      margin-top: 18px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .scan-bottom {
      pointer-events: auto;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px 16px calc(16px + var(--safe-b));
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scan-status-txt {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      min-height: 16px;
    }
    .scan-status-txt.busy { color: var(--gold); }

    .scan-btns { display: grid; grid-template-columns: 1fr auto; gap: 8px; }

    /* ─── UPLOAD SHEET ─── */
    #uploadSheet {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      align-items: flex-end;
    }
    #uploadSheet.active { display: flex; }

    .sheet {
      width: 100%;
      background: var(--s1);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border-top: 1px solid var(--border);
      padding: 20px 20px calc(22px + var(--safe-b));
      animation: sheetUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--s3); margin: 0 auto 16px; }
    .sheet-ttl { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; color:var(--gold-l); margin-bottom:3px; }
    .sheet-sub { font-size:0.74rem; color:var(--muted); margin-bottom:14px; }

    .drop-zone {
      border: 1.5px dashed rgba(201,168,76,0.22);
      border-radius: var(--r);
      padding: 28px 16px;
      text-align: center;
      background: var(--gold-d);
      cursor: pointer;
      transition: all .2s;
    }
    .drop-zone:active, .drop-zone.drag { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.1); }
    .drop-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    .drop-zone p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .drop-zone strong { color: var(--gold); }

    /* ─── MAIN APP ─── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(20px + var(--safe-b));
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(14px + var(--safe-t)) 18px 12px;
    }

    .brand-event { font-size:0.58rem; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); opacity:.8; display:block; }
    .brand-name  { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; color:var(--gold-l); line-height:1.05; }

    .db-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 11px;
      border-radius: 999px;
      background: var(--s2);
      border: 1px solid var(--border);
      font-size: 0.64rem; font-weight: 700; letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .db-pill:active { opacity: .7; }
    .db-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:all .3s; }
    .db-pill.ready { color:var(--green); border-color:rgba(52,211,153,.25); background:var(--green-d); }
    .db-pill.ready .db-dot { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* Counters */
    .counters {
      display: none;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      padding: 0 18px 8px;
    }

    .ctr {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 6px;
      text-align: center;
    }
    .ctr strong { display:block; font-family:'Cormorant Garamond',serif; font-size:1.65rem; font-weight:600; color:var(--gold-l); line-height:1; }
    .ctr span   { display:block; margin-top:3px; font-size:0.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

    /* Input zone */
    .input-zone { padding: 8px 18px 12px; display:flex; flex-direction:column; gap:8px; }

    .field-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 50px 16px 18px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      -webkit-appearance: none;
      transition: all .2s;
    }
    input[type="text"]::placeholder { color:var(--muted); font-weight:400; letter-spacing:.03em; font-size:.86rem; }
    input[type="text"]:focus { outline:none; border-color:var(--border-g); background:var(--s2); box-shadow:0 0 0 3px rgba(201,168,76,.1); }

    .field-clear {
      position:absolute; right:0; top:0; bottom:0; width:50px;
      display:flex; align-items:center; justify-content:center;
      background:none; border:none; color:var(--muted); font-size:.95rem;
      cursor:pointer; opacity:0; transition:opacity .15s;
    }
    input[type="text"]:not(:placeholder-shown) ~ .field-clear { opacity:1; }

    .action-row { display:grid; grid-template-columns:1fr auto; gap:8px; }

    /* Buttons */
    .btn {
      font-family:'Syne',sans-serif; font-size:.78rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:0 18px; height:52px;
      background:var(--s2); color:var(--dim);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:all .18s; -webkit-appearance:none;
    }
    .btn:active { opacity:.7; transform:scale(.98); }

    .btn.primary {
      background: linear-gradient(160deg, #d9b85c 0%, #a8823a 100%);
      color: #1a1000; border-color:transparent;
      box-shadow: 0 2px 14px rgba(201,168,76,.22);
      flex:1;
    }

    .btn.ghost {
      background:var(--s1); color:var(--dim);
      width:52px; padding:0; font-size:1.15rem;
    }

    /* OCR text box */
    .ocr-box {
      display:none; margin:0 18px;
      background:var(--s1); border:1px solid var(--border-g);
      border-radius:var(--r); padding:12px 14px;
    }
    .ocr-box.show { display:block; }
    .ocr-lbl { font-size:.6rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
    .ocr-txt { font-size:.78rem; color:var(--dim); line-height:1.55; white-space:pre-wrap; word-break:break-word; max-height:80px; overflow-y:auto; }

    /* Result card */
    #resultCard { display:none; margin:12px 18px 0; background:var(--s1); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
    #resultCard.valid      { border-color:rgba(52,211,153,.3); }
    #resultCard.invalid    { border-color:rgba(248,113,113,.3); }
    #resultCard.not-found  { border-color:rgba(107,122,150,.2); }
    #resultCard.error      { border-color:rgba(251,191,36,.3); }

    .r-top { padding:14px 14px 10px; display:flex; align-items:center; gap:10px; }
    .r-ico  { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    .r-ico.valid     { background:var(--green-d); }
    .r-ico.invalid   { background:var(--red-d); }
    .r-ico.not-found { background:rgba(107,122,150,.1); }
    .r-ico.error     { background:var(--amber-d); }

    .r-ttl { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; line-height:1.1; }
    .r-ttl.valid     { color:var(--green); }
    .r-ttl.invalid   { color:var(--red); }
    .r-ttl.not-found { color:var(--dim); }
    .r-ttl.error     { color:var(--amber); }
    .r-sub { font-size:.74rem; color:var(--muted); margin-top:2px; }

    .badges { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px; }
    .badge { padding:4px 10px; font-size:.63rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; border-radius:999px; border:1px solid; }
    .badge.ok   { color:var(--green); border-color:rgba(52,211,153,.4);  background:var(--green-d); }
    .badge.warn { color:var(--amber); border-color:rgba(251,191,36,.4);  background:var(--amber-d); }
    .badge.bad  { color:var(--red);   border-color:rgba(248,113,113,.4); background:var(--red-d); }

    .details { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-top:1px solid var(--border); }
    .di { background:var(--s1); padding:10px 12px; }
    .di small { display:block; font-size:.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
    .di strong { font-size:.8rem; font-weight:500; color:var(--text); line-height:1.35; word-break:break-word; }

    /* Toasts */
    .toast-wrap {
      position:fixed; top:calc(12px + var(--safe-t));
      left:50%; transform:translateX(-50%);
      width:min(440px, calc(100vw - 28px));
      display:flex; flex-direction:column; gap:6px;
      z-index:200; pointer-events:none;
    }
    .toast {
      pointer-events:auto;
      background:var(--s2); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:10px 12px;
      font-size:.78rem; font-weight:500;
      display:flex; align-items:center; gap:8px;
      box-shadow:0 8px 24px rgba(0,0,0,.5);
      animation:toastIn .2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(-8px) scale(.95)} to{opacity:1;transform:none} }
    .t-bar { width:3px; height:18px; border-radius:2px; flex-shrink:0; }
    .toast.info .t-bar    { background:var(--gold); }
    .toast.success .t-bar { background:var(--green); }
    .toast.error .t-bar   { background:var(--red); }
  </style>
</head>
<body>

  <!-- ── SCANNER OVERLAY (fullscreen) ── -->
  <div id="scanOverlay">
    <video id="scanVideo" playsinline muted autoplay></video>
    <div class="scan-ui">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
      <p class="scan-hint">Aponte para o código do bilhete</p>
    </div>
    <div class="scan-bottom">
      <div id="scanStatus" class="scan-status-txt">Câmara activa</div>
      <div class="scan-btns">
        <button id="captureBtn" class="btn primary" type="button">📸 &nbsp;Fotografar e Ler Texto</button>
        <button id="closeScanBtn" class="btn ghost" type="button">✕</button>
      </div>
    </div>
    <canvas id="captureCanvas" hidden></canvas>
  </div>

  <!-- ── UPLOAD BOTTOM SHEET ── -->
  <div id="uploadSheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-ttl">Base de Dados</div>
      <p class="sheet-sub">Carregue o ficheiro Excel com os registos do jantar.</p>
      <input id="excelInput" type="file" accept=".xlsx,.xls" hidden>
      <div id="dropZone" class="drop-zone" role="button" tabindex="0">
        <span class="drop-icon">📊</span>
        <p><strong>Toque para escolher</strong><br><small style="color:var(--muted)">.xlsx · .xls</small></p>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div class="app">
    <div class="topbar">
      <div>
        <span class="brand-event">Jantar de Cursos</span>
        <span class="brand-name">Bilhetes</span>
      </div>
      <button id="dbBtn" class="db-pill" type="button">
        <span class="db-dot"></span>
        <span id="dbLabel">Sem BD</span>
      </button>
    </div>

    <div id="counterBar" class="counters" aria-live="polite">
      <div class="ctr"><strong id="cntTotal">0</strong><span>Registos</span></div>
      <div class="ctr"><strong id="cntIssued">0</strong><span>Bilhetes</span></div>
      <div class="ctr"><strong id="cntValid">0</strong><span>Validados</span></div>
    </div>

    <div class="input-zone">
      <div class="field-wrap">
        <input id="codeInput" type="text" placeholder="Ex: B-2003-2-NCRZNC"
               autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text">
        <button id="clearBtn" class="field-clear" type="button" aria-label="Limpar">✕</button>
      </div>
      <div class="action-row">
        <button id="verifyBtn" class="btn primary" type="button">Verificar</button>
        <button id="openScanBtn" class="btn ghost" type="button" aria-label="Abrir scanner">📷</button>
      </div>
    </div>

    <!-- Extracted OCR text -->
    <div id="ocrBox" class="ocr-box">
      <div class="ocr-lbl">Texto reconhecido pela câmara</div>
      <div id="ocrTxt" class="ocr-txt"></div>
    </div>

    <!-- Result -->
    <div id="resultCard" aria-live="polite"></div>
  </div>

  <div id="toastWrap" class="toast-wrap" aria-live="polite"></div>

  <script>
    const expectedCols = [
      'Nome','Número de Telemóvel','Email','Curso','Ano','Pratos',
      'Método de Pagamento','Hora','Pagamento','Confirmado por',
      'Confirmado','Bilhete','Validado em'
    ];

    const state = { rows:[], map:new Map(), loaded:false, stream:null, ocr:false };
    const $ = id => document.getElementById(id);

    const scanOverlay  = $('scanOverlay');
    const scanVideo    = $('scanVideo');
    const scanStatus   = $('scanStatus');
    const captureBtn   = $('captureBtn');
    const closeScanBtn = $('closeScanBtn');
    const captureCanvas= $('captureCanvas');
    const uploadSheet  = $('uploadSheet');
    const excelInput   = $('excelInput');
    const dropZone     = $('dropZone');
    const dbBtn        = $('dbBtn');
    const dbLabel      = $('dbLabel');
    const counterBar   = $('counterBar');
    const cntTotal     = $('cntTotal');
    const cntIssued    = $('cntIssued');
    const cntValid     = $('cntValid');
    const codeInput    = $('codeInput');
    const clearBtn     = $('clearBtn');
    const verifyBtn    = $('verifyBtn');
    const resultCard   = $('resultCard');
    const ocrBox       = $('ocrBox');
    const ocrTxt       = $('ocrTxt');
    const toastWrap    = $('toastWrap');

    function norm(s) { return String(s||'').trim().toUpperCase().replace(/\s+/g,''); }

    function extractCode(text) {
      const m = text.match(/B[-–—](\d{2,6})[-–—](\d+)[-–—]([A-Z0-9]{4,10})/i);
      if (m) return m[0].toUpperCase().replace(/[–—]/g,'-');
      const m2 = text.match(/B\s*[-–—\s]\s*(\d{2,6})\s*[-–—\s]\s*(\d+)\s*[-–—\s]\s*([A-Z0-9]{4,10})/i);
      if (m2) return `B-${m2[1]}-${m2[2]}-${m2[3]}`.toUpperCase();
      return null;
    }

    function toast(msg, kind='info') {
      const el = document.createElement('div');
      el.className = `toast ${kind}`;
      el.innerHTML = `<div class="t-bar"></div><span>${msg}</span>`;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.style.cssText = 'opacity:0;transform:translateY(-5px);transition:.18s';
        setTimeout(() => el.remove(), 200);
      }, 3200);
    }

    function trimHeaders(row) {
      const o = {};
      Object.keys(row||{}).forEach(k => o[String(k).trim()] = row[k]);
      return o;
    }

    /* DB status */
    function setDb(ok, fn='') {
      state.loaded = ok;
      dbBtn.className = 'db-pill' + (ok?' ready':'');
      dbLabel.textContent = ok ? (fn ? fn.replace(/\.(xlsx|xls)$/i,'').slice(0,16) : 'Carregado') : 'Sem BD';
    }

    function updateCounters() {
      cntTotal.textContent  = state.rows.length;
      cntIssued.textContent = state.rows.filter(r => norm(r['Bilhete']) !== '').length;
      cntValid.textContent  = state.rows.filter(r => norm(r['Validado em']||'') !== '').length;
      counterBar.style.display = 'grid';
    }

    /* Load Excel */
    async function loadExcel(file) {
      if (!file) return;
      if (!/\.(xlsx|xls)$/i.test(file.name)) { toast('Formato inválido. Use .xlsx ou .xls','error'); return; }
      try {
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        if (!ws) throw new Error('Ficheiro sem folhas.');
        const rows = XLSX.utils.sheet_to_json(ws,{defval:''}).map(trimHeaders);
        state.rows = rows;
        state.map = new Map();
        rows.forEach(r => { const t = norm(r['Bilhete']); if (t) state.map.set(t,r); });
        const avail = new Set(Object.keys(rows[0]||{}).map(x=>String(x).trim()));
        const miss = expectedCols.filter(c => !avail.has(c));
        if (miss.length) toast(`Colunas em falta: ${miss.slice(0,3).join(', ')}${miss.length>3?'…':''}`, 'error');
        setDb(true, file.name);
        updateCounters();
        toast(`${rows.length} registos carregados.`, 'success');
        closeSheet();
      } catch(err) {
        console.error(err);
        setDb(false);
        toast(`Erro: ${err.message||err}`, 'error');
      }
    }

    /* Upload sheet */
    function openSheet()  { uploadSheet.classList.add('active'); }
    function closeSheet() { uploadSheet.classList.remove('active'); }

    uploadSheet.addEventListener('click', e => { if (e.target===uploadSheet) closeSheet(); });
    dbBtn.addEventListener('click', openSheet);
    dropZone.addEventListener('click', () => excelInput.click());
    dropZone.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); excelInput.click(); } });
    excelInput.addEventListener('change', e => loadExcel(e.target.files?.[0]));
    ['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag'); }));
    dropZone.addEventListener('drop', e => loadExcel(e.dataTransfer?.files?.[0]));

    /* Verify */
    function payOk(row) {
      const t = norm(`${row['Pagamento']||''} ${row['Confirmado']||''}`);
      return ['SIM','PAGO','OK','TRUE','CONFIRMADO','YES'].some(f => t.includes(f));
    }

    function verify(raw) {
      const code = norm(raw);
      if (!state.loaded) { showResult('error'); toast('Carregue a base de dados primeiro.','error'); return; }
      if (!code) { toast('Introduza um código de bilhete.','error'); return; }
      const row = state.map.get(code);
      if (!row) { showResult('not-found',{code}); toast('Bilhete não encontrado.','error'); return; }
      if (!norm(row['Bilhete'])) { showResult('invalid',{row}); toast('Registo sem bilhete emitido.','error'); return; }
      showResult('valid',{row});
      toast('Bilhete válido.','success');
    }

    function showResult(type, data={}) {
      resultCard.style.display = 'block';
      resultCard.className = type;
      const ico = {valid:'✅',invalid:'⛔','not-found':'🔍',error:'⚠️'};
      const ttl = {valid:'Bilhete válido',invalid:'Inválido','not-found':'Não encontrado',error:'Erro'};

      if (type==='error') {
        resultCard.innerHTML = `<div class="r-top"><div class="r-ico error">${ico.error}</div><div><div class="r-ttl error">${ttl.error}</div><div class="r-sub">Carregue primeiro o ficheiro Excel.</div></div></div>`;
        return;
      }
      if (type==='not-found') {
        resultCard.innerHTML = `<div class="r-top"><div class="r-ico not-found">${ico['not-found']}</div><div><div class="r-ttl not-found">${ttl['not-found']}</div><div class="r-sub">O código <strong>${data.code||'-'}</strong> não existe na base de dados.</div></div></div>`;
        return;
      }
      if (type==='invalid') {
        resultCard.innerHTML = `<div class="r-top"><div class="r-ico invalid">${ico.invalid}</div><div><div class="r-ttl invalid">${ttl.invalid}</div><div class="r-sub">Registo sem bilhete emitido.</div></div></div>`;
        return;
      }

      const r = data.row;
      const paid = payOk(r);
      const already = norm(r['Validado em']||'') !== '';

      resultCard.innerHTML = `
        <div class="r-top">
          <div class="r-ico valid">${ico.valid}</div>
          <div>
            <div class="r-ttl valid">${ttl.valid}</div>
            <div class="r-sub">${r['Bilhete']||'-'}</div>
          </div>
        </div>
        <div class="badges">
          <span class="badge ${paid?'ok':'warn'}">${paid?'Pago':'Verificar pagamento'}</span>
          <span class="badge ${already?'bad':'ok'}">${already?'Já validado':'1.ª entrada'}</span>
        </div>
        <div class="details">
          <div class="di"><small>Nome</small><strong>${r['Nome']||'-'}</strong></div>
          <div class="di"><small>Curso · Ano</small><strong>${r['Curso']||'-'} · ${r['Ano']||'-'}</strong></div>
          <div class="di"><small>Pratos</small><strong>${r['Pratos']||'-'}</strong></div>
          <div class="di"><small>Pagamento</small><strong>${r['Método de Pagamento']||'-'}</strong></div>
          <div class="di"><small>Email</small><strong>${r['Email']||'-'}</strong></div>
          <div class="di"><small>Telemóvel</small><strong>${r['Número de Telemóvel']||'-'}</strong></div>
          <div class="di"><small>Hora</small><strong>${r['Hora']||'-'}</strong></div>
          <div class="di"><small>Validado em</small><strong>${r['Validado em']||'—'}</strong></div>
        </div>`;

      setTimeout(() => resultCard.scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
    }

    /* Input events */
    codeInput.addEventListener('input', () => { codeInput.value = codeInput.value.toUpperCase(); });
    codeInput.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); verify(codeInput.value); } });
    clearBtn.addEventListener('click', () => { codeInput.value=''; codeInput.focus(); ocrBox.classList.remove('show'); });
    verifyBtn.addEventListener('click', () => verify(codeInput.value));

    /* Scanner */
    async function openScanner() {
      try {
        if (state.stream) return;
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
          audio:false
        });
        state.stream = stream;
        scanVideo.srcObject = stream;
        await scanVideo.play();
        scanOverlay.classList.add('active');
        scanStatus.textContent = 'Câmara activa';
        scanStatus.className = 'scan-status-txt';
      } catch(err) {
        console.error(err);
        toast('Não foi possível abrir a câmara.','error');
      }
    }

    function closeScanner() {
      if (state.stream) state.stream.getTracks().forEach(t => t.stop());
      state.stream = null;
      scanVideo.srcObject = null;
      scanOverlay.classList.remove('active');
      state.ocr = false;
      captureBtn.disabled = false;
      captureBtn.innerHTML = '📸 &nbsp;Fotografar e Ler Texto';
    }

    async function doCapture() {
      if (state.ocr) return;
      if (!state.stream || !scanVideo.videoWidth) { toast('Câmara não disponível.','error'); return; }

      state.ocr = true;
      captureBtn.disabled = true;
      captureBtn.textContent = 'A processar…';
      scanStatus.textContent = 'A reconhecer texto…';
      scanStatus.className = 'scan-status-txt busy';

      try {
        // Capture current frame
        const ctx = captureCanvas.getContext('2d');
        captureCanvas.width  = scanVideo.videoWidth;
        captureCanvas.height = scanVideo.videoHeight;
        ctx.drawImage(scanVideo, 0, 0);

        // OCR
        const result = await Tesseract.recognize(captureCanvas, 'por+eng', {
          logger: m => {
            if (m.status==='recognizing text' && typeof m.progress==='number')
              scanStatus.textContent = `OCR: ${Math.round(m.progress*100)}%`;
          }
        });

        const rawText = String(result?.data?.text||'').trim();

        // Always display extracted text
        if (rawText) {
          ocrTxt.textContent = rawText;
          ocrBox.classList.add('show');
        }

        const code = extractCode(rawText);

        if (code) {
          codeInput.value = code;
          closeScanner();
          toast(`Código lido: ${code}`, 'success');
          verify(code);
        } else if (rawText) {
          // No code found — show text, let user pick manually
          // Put the most promising line into the input
          const best = rawText.split('\n').map(l=>l.trim()).filter(l=>l.length>3).sort((a,b)=>b.length-a.length)[0]||'';
          codeInput.value = best.toUpperCase().slice(0,30);
          closeScanner();
          toast('Texto reconhecido. Confirme o código manualmente.','info');
        } else {
          scanStatus.textContent = 'Sem texto reconhecido. Tente novamente.';
          toast('Sem texto detectado. Tente com mais luz.','error');
          state.ocr = false;
          captureBtn.disabled = false;
          captureBtn.innerHTML = '📸 &nbsp;Fotografar e Ler Texto';
        }
      } catch(err) {
        console.error(err);
        scanStatus.textContent = 'Erro no OCR.';
        toast(`Erro OCR: ${err.message||err}`, 'error');
        state.ocr = false;
        captureBtn.disabled = false;
        captureBtn.innerHTML = '📸 &nbsp;Fotografar e Ler Texto';
      }
    }

    openScanBtn.addEventListener('click', openScanner);
    closeScanBtn.addEventListener('click', closeScanner);
    captureBtn.addEventListener('click', doCapture);
  </script>
</body>
</html>
